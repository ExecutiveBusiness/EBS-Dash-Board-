  openModal(`
    <div class="modal-header"><h3>${isEdit?'Edit User':'New User'}</h3><button class="icon-btn" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>Full Name</label><input type="text" id="uf-name" value="${escapeHtml(user.name)}" /></div>
        <div class="field"><label>Email</label><input type="email" id="uf-email" value="${escapeHtml(user.email)}" /></div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Role</label>
          <select id="uf-role">
            <option value="manager" ${user.role==='manager'?'selected':''}>Manager</option>
            <option value="teamlead" ${user.role==='teamlead'?'selected':''}>Team Lead</option>
            <option value="accountant" ${user.role==='accountant'?'selected':''}>Accountant</option>
          </select>
        </div>
        <div class="field" id="uf-team-field">
          <label>Team</label>
          <select id="uf-team">${DB.data.teams.map(t=>`<option value="${t.id}" ${user.teamId===t.id?'selected':''}>${t.name}</option>`).join('')}</select>
        </div>
      </div>
      <div class="field"><label>${isEdit?'Reset Password (leave blank to keep current)':'Temporary Password'}</label><input type="password" id="uf-pass" placeholder="${isEdit?'••••••••':''}" /></div>
      <div class="field"><label>Telegram Handle (optional)</label><input type="text" id="uf-telegram" value="${escapeHtml(user.telegram||'')}" placeholder="@username" /></div>
    </div>
    <div class="modal-footer">
      ${isEdit?`<button class="btn btn-danger" id="delete-user-btn" style="margin-right:auto;">Remove User</button>`:''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-user-btn">${isEdit?'Save Changes':'Create User'}</button>
    </div>
  `, { wide:true });

  function toggleTeamField(){
    document.getElementById('uf-team-field').style.display = document.getElementById('uf-role').value==='manager' ? 'none' : 'block';
  }
  document.getElementById('uf-role').addEventListener('change', toggleTeamField);
  toggleTeamField();

  document.getElementById('save-user-btn').addEventListener('click', ()=>{
    const name = document.getElementById('uf-name').value.trim();
    const email = document.getElementById('uf-email').value.trim();
    if (!name || !email){ toast('Name and email are required.', 'error'); return; }
    const role = document.getElementById('uf-role').value;
    const teamId = role==='manager' ? null : document.getElementById('uf-team').value;
    const passVal = document.getElementById('uf-pass').value;
    const telegram = document.getElementById('uf-telegram').value.trim();
    if (isEdit){
      user.name=name; user.email=email; user.role=role; user.teamId=teamId; user.telegram=telegram;
      if (passVal) user.password = passVal;
      toast('User updated.', 'success');
    } else {
      if (!passVal){ toast('A temporary password is required for new users.', 'error'); return; }
      const id = 'u-' + Date.now().toString(36);
      DB.data.users.push({ id, name, email, password:passVal, role, teamId, telegram });
      toast('User created.', 'success');
    }
    DB.save(); closeModal(); renderCurrentRoute();
  });

  const delBtn = document.getElementById('delete-user-btn');
  if (delBtn) delBtn.addEventListener('click', ()=>{
    if (confirm(`Remove ${user.name}? This cannot be undone.`)){
      DB.data.users = DB.data.users.filter(u=>u.id!==user.id);
      DB.save(); closeModal(); toast('User removed.', 'success'); renderCurrentRoute();
    }
  });
}

   ============================================================ */
function renderAuditLog(){
  if (LL.user.role !== 'manager'){ toast('Audit Log is available to Managers only.', 'error'); navigate('overview'); return; }
  setPageTitle('audit');

  const entries = [];
  DB.data.tasks.forEach(t=>{
    const c = clientById(t.clientId);
    t.activity.forEach(a=>{
      entries.push({ ts:a.ts, by:a.by, text:a.text, client:c.name, taskId:t.id, team:teamById(t.teamId).name, taskType:t.taskType });
    });
  });
  entries.sort((a,b)=> new Date(b.ts)-new Date(a.ts));

  let html = `<div class="section-head">
    <h2>Firm-wide Stage Change Log</h2>
    <button class="btn btn-secondary btn-sm" id="export-audit-btn">Export CSV</button>
  </div>
  <div class="card scroll-x" style="max-height:70vh; overflow-y:auto;"><table class="tbl"><thead><tr>
    <th>When</th><th>Client</th><th>Team</th><th>Type</th><th>By</th><th>Change</th>
  </tr></thead><tbody>
  ${entries.map(e=>`<tr>
    <td>${fmtDateTime(e.ts)}</td>
    <td class="fw-600">${escapeHtml(e.client)}</td>
    <td>${e.team}</td>
    <td><span class="tag ${e.taskType==='VAT Filing'?'tag-vat':'tag-acc'}">${e.taskType}</span></td>
    <td>${escapeHtml(e.by)}</td>
    <td>${escapeHtml(e.text)}</td>
  </tr>`).join('')}
  </tbody></table></div>`;

  document.getElementById('content').innerHTML = html;
  document.getElementById('export-audit-btn').addEventListener('click', ()=> exportAuditCSV(entries));
}

function exportAuditCSV(entries){
  const header = ['Timestamp','Client','Team','Task Type','Changed By','Change'];
  const rows = entries.map(e=>[e.ts, e.client, e.team, e.taskType, e.by, e.text.replace(/"/g,"'")]);
  downloadCSV('audit_log.csv', header, rows);
  toast('Audit log exported.', 'success');
}

function downloadCSV(filename, header, rows){
  const csv = [header, ...rows].map(r=> r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- Notifications (Section 10) ---------- */
function myNotifications(){
  return DB.data.notifications.filter(n=>n.userId===LL.user.id).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
}
function refreshNotifDot(){
  const dot = document.getElementById('notif-dot');
  if (!dot) return;
  const hasUnread = myNotifications().some(n=>!n.read);
  dot.style.display = hasUnread ? 'block' : 'none';
}

function openNotificationsModal(){
  const notifs = myNotifications();
  openModal(`
    <div class="modal-header">
      <h3>Notifications</h3>
      <div class="flex gap-8">
        ${notifs.length ? `<button class="btn btn-ghost btn-sm" id="mark-all-read-btn">Mark all read</button>` : ''}
        <button class="icon-btn" onclick="closeModal()">&times;</button>
      </div>
    </div>
    <div class="modal-body" style="max-height:60vh;">
      ${notifs.length ? notifs.map(n=>`
        <div class="activity-item clickable" data-notif="${n.id}" data-task="${n.taskId||''}" style="${n.read?'opacity:0.6;':''}">
          <div class="activity-dot" style="background:${n.read?'var(--ink-faint)':'var(--brand)'};"></div>
          <div>
            <div class="activity-text">${escapeHtml(n.text)}</div>
            <div class="activity-meta">${fmtDateTime(n.ts)}</div>
          </div>
        </div>`).join('') : `<div class="empty-state" style="padding:30px 10px;">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.6"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <h4>No notifications</h4><p>You're all caught up.</p>
        </div>`}
    </div>
  `, { wide:true });

  document.querySelectorAll('[data-notif]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const n = DB.data.notifications.find(x=>x.id===el.dataset.notif);
      if (n) n.read = true;
      DB.save();
      closeModal();
      refreshNotifDot();
      if (el.dataset.task) navigate('taskdetail', el.dataset.task);
    });
  });
  const markAll = document.getElementById('mark-all-read-btn');
  if (markAll) markAll.addEventListener('click', ()=>{
    myNotifications().forEach(n=>n.read=true);
    DB.save();
    closeModal();
    refreshNotifDot();
  });
}

/* ---------- Global search (Section 12 #4) ---------- */
function wireGlobalSearch(){
  const input = document.getElementById('global-search');
  input.addEventListener('input', ()=> renderSearchResults(input.value.trim()));
  input.addEventListener('focus', ()=> renderSearchResults(input.value.trim()));
  document.addEventListener('click', (e)=>{
    if (!e.target.closest('#global-search') && !e.target.closest('#search-results-root')){
      document.getElementById('search-results-root').innerHTML = '';
    }
  });
}

function renderSearchResults(q){
  const root = document.getElementById('search-results-root');
  if (!q){ root.innerHTML = ''; return; }
  const ql = q.toLowerCase();
  const user = LL.user;

  let clientMatches = visibleClients(user).filter(c=> c.name.toLowerCase().includes(ql) || (c.trn||'').includes(q) || (c.trade||'').toLowerCase().includes(ql)).slice(0,5);
  let taskMatches = visibleTasks(user).filter(t=>{
    const c = clientById(t.clientId);
    return c.name.toLowerCase().includes(ql) || t.period.toLowerCase().includes(ql);
  }).slice(0,5);

  if (!clientMatches.length && !taskMatches.length){
    root.innerHTML = `<div class="search-dropdown"><div class="text-sm muted" style="padding:14px;">No matches for "${escapeHtml(q)}"</div></div>`;
    styleSearchDropdown();
    return;
  }

  let html = `<div class="search-dropdown">`;
  if (clientMatches.length && user.role !== 'accountant'){
    html += `<div class="sr-group-label">Clients</div>`;
    clientMatches.forEach(c=>{
      html += `<div class="sr-item" data-go="client" data-id="${c.id}"><span class="fw-600">${escapeHtml(c.name)}</span><span class="text-xs muted"> — ${teamById(c.teamId).name}</span></div>`;
    });
  }
  if (taskMatches.length){
    html += `<div class="sr-group-label">Tasks</div>`;
    taskMatches.forEach(t=>{
      const c = clientById(t.clientId);
      html += `<div class="sr-item" data-go="task" data-id="${t.id}"><span class="fw-600">${escapeHtml(c.name)}</span><span class="text-xs muted"> — ${t.taskType}, ${t.period}</span></div>`;
    });
  }
  html += `</div>`;
  root.innerHTML = html;
  styleSearchDropdown();

  root.querySelectorAll('.sr-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      navigate(el.dataset.go === 'client' ? 'clientdetail' : 'taskdetail', el.dataset.id);
      document.getElementById('global-search').value = '';
      root.innerHTML = '';
    });
  });
}
function styleSearchDropdown(){
  const el = document.querySelector('.search-dropdown');
  if (!el) return;
  Object.assign(el.style, {
    position:'fixed', top:'58px', left:'260px', width:'360px', background:'var(--surface)',
    border:'1px solid var(--border)', borderRadius:'10px', boxShadow:'var(--shadow-lg)', zIndex:'190',
    maxHeight:'360px', overflowY:'auto', padding:'6px',
  });
  el.querySelectorAll('.sr-group-label').forEach(g=> Object.assign(g.style, { fontSize:'10.5px', textTransform:'uppercase', letterSpacing:'0.05em', color:'var(--ink-faint)', fontWeight:'700', padding:'8px 10px 4px' }));
  el.querySelectorAll('.sr-item').forEach(it=> Object.assign(it.style, { padding:'8px 10px', borderRadius:'6px', cursor:'pointer', fontSize:'13px' }));
  el.querySelectorAll('.sr-item').forEach(it=>{
    it.addEventListener('mouseenter', ()=> it.style.background='var(--surface-sunken)');
    it.addEventListener('mouseleave', ()=> it.style.background='');
  });
}

/* ---------- Excel Export (Manager-only, Section 8.3 / 12) ---------- */
function exportTasksToExcel(){
  if (!can(LL.user,'exportExcel')){ toast('Excel export is available to Managers only.', 'error'); return; }
  const header = ['Client','Team','Task Type','Period','Assignee','Stage','Due Date','Accounting Method','Transactions'];
  const rows = DB.data.tasks.map(t=>{
    const c = clientById(t.clientId);
    const a = userById(t.assigneeId);
    return [c.name, teamById(t.teamId).name, t.taskType, t.period, a.name, stageMeta(t.stage).label, t.dueDate, t.accountingMethod||'', t.transactionCount ?? ''];
  });
  downloadCSV('tasks_export.xlsx.csv', header, rows);
  toast('Task list exported.', 'success');
}
function exportClientsToExcel(){
  if (!can(LL.user,'exportExcel')){ toast('Excel export is available to Managers only.', 'error'); return; }
  const header = ['Client','Team','Trade License','TRN','Accounting Periodicity','VAT Registered','VAT Frequency','Accounting Method','Status'];
  const rows = DB.data.clients.map(c=>[c.name, teamById(c.teamId).name, c.trade, c.trn||'', c.periodicity, c.vatRegistered?'Yes':'No', c.vatFreq||'', c.accountingMethod, c.status]);
  downloadCSV('clients_export.xlsx.csv', header, rows);
  toast('Client list exported.', 'success');
}
