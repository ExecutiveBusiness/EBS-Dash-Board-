<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EBS — Task &amp; Client Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  /* Surfaces */
  --paper:#F7F7F4;
  --surface:#FFFFFF;
  --surface-sunken:#F0F0EC;
  --ink:#10172A;
  --ink-soft:#475067;
  --ink-faint:#8A91A3;
  --border:#E3E3DD;
  --border-strong:#CBCCC3;

  /* Brand */
  --brand:#1E3A5F;       /* deep ledger navy */
  --brand-ink:#10172A;
  --accent:#C77B3B;      /* warm copper accent — used sparingly */

  /* Stage colors — the firm's stage language, used everywhere */
  --stage-open:        #8A91A3;  /* slate — not started */
  --stage-open-bg:      #F0F1F3;
  --stage-todo:        #B45309;  /* amber-dark — waiting */
  --stage-todo-bg:      #FEF3E2;
  --stage-progress:    #2563EB;  /* blue — active */
  --stage-progress-bg:  #EAF1FE;
  --stage-docs:         #C77B3B; /* copper — waiting on client */
  --stage-docs-bg:       #FBEEE0;
  --stage-review:      #7C3AED;  /* violet — pending judgement */
  --stage-review-bg:    #F1EBFD;
  --stage-rework:      #DC4F33;  /* orange-red — needs fixing */
  --stage-rework-bg:    #FBE7E1;
  --stage-verified:    #0E8A6D;  /* green — approved */
  --stage-verified-bg:  #E5F5EF;
  --stage-done:        #10172A;  /* ink — closed */
  --stage-done-bg:      #E9EAEC;

  --danger:#C0392B;
  --danger-bg:#FBE9E7;
  --warn:#B45309;
  --warn-bg:#FEF3E2;
  --ok:#0E8A6D;
  --ok-bg:#E5F5EF;

  --radius-sm:6px;
  --radius:10px;
  --radius-lg:16px;
  --shadow-sm: 0 1px 2px rgba(16,23,42,0.06);
  --shadow-md: 0 4px 16px rgba(16,23,42,0.08);
  --shadow-lg: 0 12px 32px rgba(16,23,42,0.14);

  --font-display:'Lexend', system-ui, sans-serif;
  --font-body:'Inter', system-ui, sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  font-size:14px;
  line-height:1.5;
}
h1,h2,h3,h4,.font-display{font-family:var(--font-display);}
button{font-family:inherit;}
input,select,textarea{font-family:inherit; font-size:14px;}
a{color:var(--brand); text-decoration:none;}
::selection{background:#cfe0fb;}

:focus-visible{
  outline:2px solid var(--stage-progress);
  outline-offset:2px;
  border-radius:4px;
}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--ink-faint);}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{display:none; height:100vh; width:100vw; overflow:hidden;}
#app.show{display:flex;}

.shell{display:flex; width:100%; height:100%;}

/* Sidebar */
.sidebar{
  width:236px; min-width:236px;
  background:var(--brand-ink);
  color:#E7E9EF;
  display:flex; flex-direction:column;
  padding:18px 14px;
  flex-shrink:0;
}
.brand{
  display:flex; align-items:center; gap:9px;
  padding:4px 8px 18px 8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  margin-bottom:14px;
}
.brand-mark{
  width:30px; height:30px; border-radius:8px;
  background:linear-gradient(135deg, #2A4A75, #16243B);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:14px; color:#fff;
  flex-shrink:0;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
}
.brand-text{font-family:var(--font-display); font-weight:600; font-size:15px; color:#fff; letter-spacing:0.01em;}
.brand-sub{font-size:10.5px; color:#8A93AA; margin-top:1px; letter-spacing:0.04em; text-transform:uppercase;}

.nav-group{margin-bottom:4px;}
.nav-label{
  font-size:10.5px; text-transform:uppercase; letter-spacing:0.07em;
  color:#677190; padding:10px 10px 6px 10px; font-weight:600;
}
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:8px 10px; border-radius:8px; cursor:pointer;
  color:#C5CAD9; font-size:13.5px; font-weight:500;
  margin-bottom:1px; transition:background 0.12s, color 0.12s;
  user-select:none;
}
.nav-item:hover{background:rgba(255,255,255,0.06); color:#fff;}
.nav-item.active{background:rgba(255,255,255,0.1); color:#fff;}
.nav-item .ic{width:16px; height:16px; flex-shrink:0; opacity:0.9;}
.nav-item .count{
  margin-left:auto; font-size:11px; background:rgba(255,255,255,0.1);
  padding:1px 6px; border-radius:20px; color:#C5CAD9; font-weight:600;
}

.sidebar-footer{margin-top:auto; padding-top:10px; border-top:1px solid rgba(255,255,255,0.08);}
.user-chip{
  display:flex; align-items:center; gap:9px; padding:8px; border-radius:8px;
  cursor:pointer; transition:background 0.12s;
}
.user-chip:hover{background:rgba(255,255,255,0.06);}
.user-avatar{
  width:30px; height:30px; border-radius:50%; flex-shrink:0;
  background:var(--accent); color:#fff; font-weight:600; font-size:12.5px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display);
}
.user-meta{overflow:hidden;}
.user-name{font-size:12.5px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.user-role{font-size:11px; color:#8A93AA;}

/* Main column */
.main{flex:1; display:flex; flex-direction:column; min-width:0; height:100%;}
.topbar{
  height:60px; flex-shrink:0;
  display:flex; align-items:center; gap:14px;
  padding:0 22px; background:var(--surface);
  border-bottom:1px solid var(--border);
}
.page-title{font-family:var(--font-display); font-size:17px; font-weight:600; color:var(--ink);}
.page-sub{font-size:12px; color:var(--ink-faint); margin-top:1px;}
.topbar-search{
  flex:1; max-width:360px; margin-left:8px;
  display:flex; align-items:center; gap:8px;
  background:var(--surface-sunken); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; color:var(--ink-faint);
}
.topbar-search input{border:none; background:none; outline:none; flex:1; color:var(--ink); font-size:13px;}
.topbar-actions{display:flex; align-items:center; gap:10px; margin-left:auto;}

.content{flex:1; overflow-y:auto; padding:22px; background:var(--paper);}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; gap:6px; justify-content:center;
  padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600;
  border:1px solid transparent; cursor:pointer; transition:all 0.12s;
  white-space:nowrap;
}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--brand); color:#fff;}
.btn-primary:hover{background:#162E4D;}
.btn-secondary{background:var(--surface); color:var(--ink); border-color:var(--border-strong);}
.btn-secondary:hover{background:var(--surface-sunken);}
.btn-ghost{background:transparent; color:var(--ink-soft);}
.btn-ghost:hover{background:var(--surface-sunken); color:var(--ink);}
.btn-danger{background:var(--danger-bg); color:var(--danger);}
.btn-danger:hover{background:#F6D8D3;}
.btn-sm{padding:5px 10px; font-size:12px;}
.btn:disabled{opacity:0.45; cursor:not-allowed;}
.icon-btn{
  width:34px; height:34px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface); display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--ink-soft); position:relative; flex-shrink:0;
}
.icon-btn:hover{background:var(--surface-sunken); color:var(--ink);}
.icon-btn .badge-dot{
  position:absolute; top:4px; right:4px; width:8px; height:8px; border-radius:50%;
  background:var(--danger); border:1.5px solid var(--surface);
}

svg.ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}

/* Cards */
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }
.card-pad{padding:18px;}

/* Stage pill — the signature element, reused everywhere */
.stage-pill{
  display:inline-flex; align-items:center; gap:6px;
  padding:3px 9px 3px 7px; border-radius:20px; font-size:11.5px; font-weight:600;
  white-space:nowrap;
}
.stage-pill .dot{width:6px; height:6px; border-radius:50%; flex-shrink:0;}
.stage-Open{background:var(--stage-open-bg); color:var(--stage-open);}
.stage-Open .dot{background:var(--stage-open);}
.stage-ToDo{background:var(--stage-todo-bg); color:var(--stage-todo);}
.stage-ToDo .dot{background:var(--stage-todo);}
.stage-InProgress{background:var(--stage-progress-bg); color:var(--stage-progress);}
.stage-InProgress .dot{background:var(--stage-progress);}
.stage-DocsAwaiting{background:var(--stage-docs-bg); color:var(--stage-docs);}
.stage-DocsAwaiting .dot{background:var(--stage-docs);}
.stage-InReview{background:var(--stage-review-bg); color:var(--stage-review);}
.stage-InReview .dot{background:var(--stage-review);}
.stage-Rework{background:var(--stage-rework-bg); color:var(--stage-rework);}
.stage-Rework .dot{background:var(--stage-rework);}
.stage-Verified{background:var(--stage-verified-bg); color:var(--stage-verified);}
.stage-Verified .dot{background:var(--stage-verified);}
.stage-Done{background:var(--stage-done-bg); color:var(--stage-done);}
.stage-Done .dot{background:var(--stage-done);}

/* Stage rail (mini pipeline visual) */
.stage-rail{display:flex; align-items:center; gap:3px;}
.stage-rail .seg{width:13px; height:5px; border-radius:3px; background:var(--border);}
.stage-rail .seg.fill{background:var(--rail-color, var(--brand));}
.stage-rail .seg.current{background:var(--rail-color, var(--brand)); box-shadow:0 0 0 2px color-mix(in srgb, var(--rail-color, var(--brand)) 25%, transparent);}

/* Tags / badges */
.tag{display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:6px; font-size:11.5px; font-weight:600;}
.tag-vat{background:#EDE9FB; color:#5B3DBF;}
.tag-acc{background:#E2F0FA; color:#1A5A8A;}
.badge-sla-green{background:var(--ok-bg); color:var(--ok); padding:2px 8px; border-radius:6px; font-size:11px; font-weight:700;}
.badge-sla-amber{background:var(--warn-bg); color:var(--warn); padding:2px 8px; border-radius:6px; font-size:11px; font-weight:700;}
.badge-sla-red{background:var(--danger-bg); color:var(--danger); padding:2px 8px; border-radius:6px; font-size:11px; font-weight:700;}

/* Tables */
table{width:100%; border-collapse:collapse;}
.tbl th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.04em;
  color:var(--ink-faint); font-weight:600; padding:10px 14px; border-bottom:1px solid var(--border);
  background:var(--surface-sunken); position:sticky; top:0;
}
.tbl td{padding:11px 14px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr.row-click{cursor:pointer;}
.tbl tr.row-click:hover{background:var(--surface-sunken);}

/* Forms */
.field{margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px;}
.field .hint{font-size:11.5px; color:var(--ink-faint); margin-top:4px;}
.field input[type=text], .field input[type=email], .field input[type=password],
.field input[type=number], .field input[type=date], .field select, .field textarea{
  width:100%; padding:9px 11px; border:1px solid var(--border-strong); border-radius:8px;
  background:var(--surface); color:var(--ink); outline:none; transition:border-color 0.12s;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--brand);}
.field-row{display:flex; gap:12px;}
.field-row .field{flex:1;}
.field.error input, .field.error select{border-color:var(--danger);}
.field-error-msg{color:var(--danger); font-size:11.5px; margin-top:4px; font-weight:500;}
.checkbox-row{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink);}

/* Modal */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(16,23,42,0.42); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:200; padding:24px;
  animation:fadeIn 0.15s ease;
}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.modal{
  background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);
  width:100%; max-width:560px; max-height:88vh; display:flex; flex-direction:column;
  animation:modalIn 0.18s cubic-bezier(.2,.9,.3,1);
}
@keyframes modalIn{from{opacity:0; transform:translateY(8px) scale(0.98);} to{opacity:1; transform:none;}}
.modal.wide{max-width:760px;}
.modal-header{display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--border);}
.modal-header h3{margin:0; font-size:16px; font-weight:600;}
.modal-body{padding:20px; overflow-y:auto; flex:1;}
.modal-footer{display:flex; justify-content:flex-end; gap:8px; padding:14px 20px; border-top:1px solid var(--border);}

/* Toast */
#toast-stack{position:fixed; bottom:20px; right:20px; z-index:300; display:flex; flex-direction:column; gap:8px; align-items:flex-end;}
.toast{
  background:var(--brand-ink); color:#fff; padding:11px 16px; border-radius:8px; font-size:13px;
  box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:9px; max-width:340px;
  animation:toastIn 0.18s ease;
}
.toast.error{background:var(--danger);}
.toast.success{background:var(--ok);}
@keyframes toastIn{from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:none;}}

/* Empty state */
.empty-state{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center; color:var(--ink-faint);}
.empty-state svg{width:40px; height:40px; margin-bottom:12px; opacity:0.5;}
.empty-state h4{color:var(--ink-soft); margin:0 0 4px 0; font-size:14px;}
.empty-state p{margin:0; font-size:12.5px; max-width:280px;}

/* Kanban */
.kanban{display:flex; gap:12px; overflow-x:auto; padding-bottom:6px; align-items:flex-start;}
.kcol{width:248px; min-width:248px; flex-shrink:0;}
.kcol-head{
  display:flex; align-items:center; gap:7px; padding:9px 4px; margin-bottom:8px;
  border-bottom:2px solid var(--rail-color); 
}
.kcol-head .dot{width:8px; height:8px; border-radius:50%; background:var(--rail-color);}
.kcol-head .name{font-size:12.5px; font-weight:700; color:var(--ink);}
.kcol-head .ct{margin-left:auto; font-size:11.5px; color:var(--ink-faint); font-weight:600;}
.kcol-body{display:flex; flex-direction:column; gap:8px; min-height:40px;}
.kcard{
  background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 12px;
  cursor:pointer; transition:box-shadow 0.12s, border-color 0.12s;
}
.kcard:hover{box-shadow:var(--shadow-sm); border-color:var(--border-strong);}
.kcard.dragging{opacity:0.4;}
.kcard .kc-client{font-size:13px; font-weight:600; color:var(--ink); margin-bottom:3px;}
.kcard .kc-period{font-size:11.5px; color:var(--ink-faint); margin-bottom:8px;}
.kcard .kc-foot{display:flex; align-items:center; justify-content:space-between; gap:6px;}
.kcard .kc-assignee{display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft);}
.kcard .mini-avatar{width:18px; height:18px; border-radius:50%; background:var(--brand); color:#fff; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; font-family:var(--font-display);}
.kcol-body.drop-target{background:var(--surface-sunken); border-radius:10px;}

/* Tabs */
.tabbar{display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:18px;}
.tabbar .tab{
  padding:10px 14px; font-size:13px; font-weight:600; color:var(--ink-faint); cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-1px;
}
.tabbar .tab:hover{color:var(--ink-soft);}
.tabbar .tab.active{color:var(--brand); border-bottom-color:var(--brand);}

/* Stat cards */
.stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;}
.stat-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px;}
.stat-card .stat-label{font-size:11.5px; color:var(--ink-faint); font-weight:600; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:8px;}
.stat-card .stat-value{font-family:var(--font-display); font-size:26px; font-weight:600; color:var(--ink); line-height:1;}
.stat-card .stat-delta{font-size:11.5px; margin-top:6px; font-weight:600;}
.stat-card .stat-delta.up{color:var(--ok);}
.stat-card .stat-delta.down{color:var(--danger);}

/* Section header */
.section-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; flex-wrap:wrap;}
.section-head h2{font-size:16px; font-weight:600; margin:0;}
.filter-bar{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.filter-bar select, .filter-bar input{
  padding:7px 10px; border:1px solid var(--border-strong); border-radius:8px; background:var(--surface);
  font-size:12.5px; color:var(--ink);
}
.pill-toggle{display:flex; background:var(--surface-sunken); border-radius:8px; padding:3px; gap:2px;}
.pill-toggle button{
  padding:6px 12px; border-radius:6px; border:none; background:none; font-size:12.5px; font-weight:600;
  color:var(--ink-faint); cursor:pointer;
}
.pill-toggle button.active{background:var(--surface); color:var(--ink); box-shadow:var(--shadow-sm);}

/* Login */
.login-wrap{
  height:100vh; width:100vw; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 20% 20%, rgba(199,123,59,0.08), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(30,58,95,0.10), transparent 45%),
    var(--paper);
}
.login-card{width:380px; padding:34px 32px; background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); border:1px solid var(--border);}
.login-brand{display:flex; align-items:center; gap:10px; margin-bottom:26px;}
.login-mark{width:38px; height:38px; border-radius:9px; background:linear-gradient(135deg,#2A4A75,#16243B); display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-display); font-weight:700;}
.login-card h1{font-size:18px; margin:0 0 2px 0;}
.login-card .sub{font-size:12.5px; color:var(--ink-faint); margin-bottom:24px;}
.login-error{background:var(--danger-bg); color:var(--danger); font-size:12.5px; padding:9px 12px; border-radius:8px; margin-bottom:14px; display:none;}
.login-foot{margin-top:18px; text-align:center;}
.login-foot a{font-size:12.5px; color:var(--ink-faint);}

/* Misc */
.muted{color:var(--ink-faint);}
.flex{display:flex;}
.flex-col{display:flex; flex-direction:column;}
.gap-6{gap:6px;} .gap-8{gap:8px;} .gap-10{gap:10px;} .gap-12{gap:12px;}
.items-center{align-items:center;}
.justify-between{justify-content:space-between;}
.w-full{width:100%;}
.mt-0{margin-top:0;} .mb-0{margin-bottom:0;}
.text-sm{font-size:12.5px;}
.text-xs{font-size:11px;}
.fw-600{font-weight:600;}
.divider{height:1px; background:var(--border); margin:14px 0;}
.scroll-x{overflow-x:auto;}
.clickable{cursor:pointer;}
.avatar-stack{display:flex;}
.avatar-stack .mini-avatar{margin-left:-6px; border:2px solid var(--surface);}
.avatar-stack .mini-avatar:first-child{margin-left:0;}

.right-rail{width:280px; flex-shrink:0;}
.help-box{background:#EAF1FE; border:1px solid #C9DCFB; border-radius:10px; padding:14px; margin-bottom:14px;}
.help-box h5{margin:0 0 6px 0; font-size:12.5px; font-weight:700; color:#1E4F8F; display:flex; align-items:center; gap:6px;}
.help-box p, .help-box ul{font-size:12px; color:#2D547F; margin:0; line-height:1.6;}
.help-box ul{padding-left:16px; margin-top:4px;}
.note-box{background:#FBEEE0; border:1px solid #F0D5B0; border-radius:10px; padding:14px; margin-bottom:14px;}
.note-box h5{margin:0 0 6px 0; font-size:12.5px; font-weight:700; color:#92560F; display:flex; align-items:center; gap:6px;}
.note-box p{font-size:12px; color:#7A4811; margin:0; line-height:1.6;}
.mini-flow{display:flex; flex-direction:column; gap:0; font-size:11.5px;}

/* ============================================================
   EBS — CORE DATA MODEL, STATE MACHINE, RBAC
   ============================================================ */

const STORE_KEY = 'ebs_v1';

/* ---------- 8-stage workflow definition ---------- */
const STAGES = [
  { id:'Open',          label:'Open',          css:'Open',          color:'var(--stage-open)' },
  { id:'ToDo',          label:'To Do',         css:'ToDo',          color:'var(--stage-todo)' },
  { id:'InProgress',    label:'In Progress',   css:'InProgress',    color:'var(--stage-progress)' },
  { id:'DocsAwaiting',  label:'Docs Awaiting', css:'DocsAwaiting',  color:'var(--stage-docs)' },
  { id:'InReview',      label:'In Review',     css:'InReview',      color:'var(--stage-review)' },
  { id:'Rework',        label:'Rework',        css:'Rework',        color:'var(--stage-rework)' },
  { id:'Verified',      label:'Verified',      css:'Verified',      color:'var(--stage-verified)' },
  { id:'Done',          label:'Done',          css:'Done',          color:'var(--stage-done)' },
];
const STAGE_INDEX = Object.fromEntries(STAGES.map((s,i)=>[s.id,i]));
function stageMeta(id){ return STAGES.find(s=>s.id===id) || STAGES[0]; }

/* Valid transitions: from -> [to...]
   Linear: Open->ToDo->InProgress->InReview->Verified->Done
   Docs loop: InProgress<->DocsAwaiting
   Rework loop: InReview->Rework->InReview->Verified
*/
const TRANSITIONS = {
  Open:          ['ToDo'],
  ToDo:          ['InProgress'],
  InProgress:    ['DocsAwaiting','InReview'],
  DocsAwaiting:  ['InProgress'],
  InReview:      ['Rework','Verified'],
  Rework:        ['InReview'],
  Verified:      ['Done'],
  Done:          [],
};

/* Which role is required to PERFORM each transition (minimum role).
   'accountant' transitions only allowed if it's their own assigned task (checked separately).
   'teamlead' also covers manager (manager can do anything teamlead can, plus more).
   'manager' = manager only.
*/
const TRANSITION_ROLE = {
  'Open->ToDo':          'teamlead',   // Manager or Team Lead sets deadline / moves to To Do
  'ToDo->InProgress':    'accountant', // Accountant starts work (or TL/Manager)
  'InProgress->DocsAwaiting': 'accountant',
  'DocsAwaiting->InProgress': 'accountant',
  'InProgress->InReview':'accountant', // Accountant submits for review
  'InReview->Rework':    'teamlead',   // Team Lead sends back
  'InReview->Verified':  'teamlead',   // Team Lead approves
  'Rework->InReview':    'accountant', // Accountant resubmits
  'Verified->Done':      'manager',    // Manager shares with client & closes
};

const ROLE_RANK = { accountant:1, teamlead:2, manager:3 };

function transitionKey(from,to){ return from+'->'+to; }

/** Returns {ok:boolean, reason?:string} for whether `actingUser` may move `task` from its current stage to `to`. */
function canTransition(task, to, actingUser){
  const from = task.stage;
  if (from === to) return { ok:false, reason:'Task is already in this stage.' };
  if (!TRANSITIONS[from] || !TRANSITIONS[from].includes(to)){
    return { ok:false, reason:`Cannot move directly from "${stageMeta(from).label}" to "${stageMeta(to).label}". Stages cannot be skipped.` };
  }
  const key = transitionKey(from,to);
  const minRole = TRANSITION_ROLE[key] || 'manager';
  if (ROLE_RANK[actingUser.role] < ROLE_RANK[minRole]){
    return { ok:false, reason:`This transition requires ${minRole === 'teamlead' ? 'a Team Lead or Manager' : 'a Manager'}.` };
  }
  // Accountants may only act on their own assigned tasks
  if (actingUser.role === 'accountant' && task.assigneeId !== actingUser.id){
    return { ok:false, reason:'You can only change the status of tasks assigned to you.' };
  }
  // Team leads may only act within their own team
  if (actingUser.role === 'teamlead' && task.teamId !== actingUser.teamId){
    return { ok:false, reason:'You can only manage tasks belonging to your own team.' };
  }
  // Field-completeness gate before entering InReview (no document upload required, per firm policy)
  if (to === 'InReview'){
    const missing = missingRequiredFields(task);
    if (missing.length){
      return { ok:false, reason:'Cannot move to "In Review" — required fields are incomplete: ' + missing.join(', ') + '.' };
    }
  }
  return { ok:true };
}

/** Required-field completeness check. Per firm policy, NO document upload is ever required at any stage —
    only data fields must be filled in before a task can move to In Review. */
function missingRequiredFields(task){
  const missing = [];
  if (!task.accountingMethod) missing.push('Accounting Method');
  if (task.transactionCount === null || task.transactionCount === undefined || task.transactionCount === '') missing.push('Number of Transactions');
  if (!task.description || !task.description.trim()) missing.push('Description');
  return missing;
}

  teamlead:  { viewAllTeams:false, createTasks:true,  editTasks:true,  deleteTasks:true,  manageClients:false, viewClients:true,  aiInsights:false, exportExcel:false, adminCenter:false },
  accountant:{ viewAllTeams:false, createTasks:false, editTasks:false, deleteTasks:false, manageClients:false, viewClients:false, aiInsights:false, exportExcel:false, adminCenter:false },

/* ============================================================
   STORAGE LAYER
   ============================================================ */
const DB = {
  data: null,
  load(){
    const raw = localStorage.getItem(STORE_KEY);
    if (raw){
      try{ this.data = JSON.parse(raw); }
      catch(e){ this.data = seedDatabase(); this.save(); }
    } else {
      this.data = seedDatabase();
      this.save();
    }
    return this.data;
  },
  save(){
    localStorage.setItem(STORE_KEY, JSON.stringify(this.data));
    // Broadcast a "live sync" event within this tab and across tabs (storage event covers other tabs)
    window.dispatchEvent(new CustomEvent('ll:sync'));
  },
  reset(){
    localStorage.removeItem(STORE_KEY);
    this.load();
  }
};

// Cross-tab live sync: if another tab updates localStorage, refresh in-memory data + re-render.
window.addEventListener('storage', (e)=>{
  if (e.key === STORE_KEY){
    DB.data = JSON.parse(e.newValue);
    if (window.LL && window.LL.onExternalSync) window.LL.onExternalSync();
  }
});

   ============================================================ */

const LL = window.LL = {
  user: null,
  route: 'overview',
  routeParam: null,
  liveTimer: null,
};

/* ---------- Boot ---------- */
document.addEventListener('DOMContentLoaded', ()=>{
  DB.load();
  wireLoginScreen();
  const savedSession = sessionStorage.getItem('ebs_session');
  if (savedSession){
    const u = DB.data.users.find(u=>u.id===savedSession);
    if (u){ loginAs(u); return; }
  }
});

function wireLoginScreen(){
  document.getElementById('login-form').addEventListener('submit', (e)=>{
    e.preventDefault();
    attemptLogin();
  });
  document.getElementById('login-submit').addEventListener('click', attemptLogin);
  document.getElementById('forgot-link').addEventListener('click', (e)=>{
    e.preventDefault();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('forgot-screen').style.display='flex';
  });
  document.getElementById('back-to-login').addEventListener('click', (e)=>{
    e.preventDefault();
    document.getElementById('forgot-screen').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('forgot-success').style.display='none';
    document.getElementById('forgot-form').reset();
  });
  document.getElementById('forgot-form').addEventListener('submit', (e)=>{
    e.preventDefault();
    document.getElementById('forgot-success').style.display='block';
  });
}

function attemptLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pw = document.getElementById('login-password').value;
  const errBox = document.getElementById('login-error');
  // Server-side-equivalent check: role and identity resolved purely from matched account record,
  // never from any client-settable field.
  const user = DB.data.users.find(u => u.email.toLowerCase() === email && u.password === pw);
  if (!user){
    errBox.textContent = 'Incorrect email or password. Please try again.';
    errBox.style.display = 'block';
    return;
  }
  errBox.style.display = 'none';
  sessionStorage.setItem('ebs_session', user.id);
  loginAs(user);
}

function loginAs(user){
  LL.user = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('forgot-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('sb-avatar').textContent = initials(user.name);
  document.getElementById('sb-name').textContent = user.name;
  document.getElementById('sb-role').textContent = roleLabel(user.role) + (user.teamId ? ' · ' + teamById(user.teamId).name : '');
  document.getElementById('logout-btn').addEventListener('click', logout, { once:true });
  document.getElementById('user-chip-btn').onclick = ()=> openProfileModal();
  document.getElementById('notif-btn').onclick = ()=> openNotificationsModal();
  wireGlobalSearch();
  renderNav();
  injectExportButton();
  refreshNotifDot();
  // default landing route per role (Section 13: dashboard-first per role)
  navigate(user.role === 'accountant' ? 'mytasks' : 'overview');
  startLiveSync();
}

function logout(){
  sessionStorage.removeItem('ebs_session');
  LL.user = null;
  if (LL.liveTimer) clearInterval(LL.liveTimer);
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-password').value='';
  document.getElementById('login-form').reset();
}

/* ---------- Live sync (Section 6) ----------
   Simulates real-time propagation: polling tick + custom event re-render +
   cross-tab `storage` event listener (in core.js) so changes in one browser tab
   reflect immediately in another with zero manual refresh. */
function startLiveSync(){
  window.addEventListener('ll:sync', renderCurrentRoute);
  LL.liveTimer = setInterval(renderCurrentRoute, 4000);
}
LL.onExternalSync = function(){ renderCurrentRoute(); };

function renderCurrentRoute(){
  if (!LL.user) return;
  renderRoute(LL.route, LL.routeParam, true);
  refreshNotifDot();
}

function injectExportButton(){
  const actions = document.querySelector('.topbar-actions');
  const existing = document.getElementById('export-xlsx-btn');
  if (existing) existing.remove();
  if (!can(LL.user, 'exportExcel')) return;
  const btn = document.createElement('button');
  btn.className = 'btn btn-secondary btn-sm';
  btn.id = 'export-xlsx-btn';
  btn.textContent = 'Export to Excel';
  btn.addEventListener('click', ()=>{
    if (LL.route === 'clients' || LL.route === 'clientdetail') exportClientsToExcel();
    else exportTasksToExcel();
  });
  actions.insertBefore(btn, document.getElementById('logout-btn'));
}

/* ---------- Small helpers ---------- */
function initials(name){
  return name.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
}
function roleLabel(r){ return { manager:'Manager', teamlead:'Team Lead', accountant:'Accountant' }[r] || r; }
function teamById(id){ return DB.data.teams.find(t=>t.id===id); }
function userById(id){ return DB.data.users.find(u=>u.id===id); }
function clientById(id){ return DB.data.clients.find(c=>c.id===id); }
function taskById(id){ return DB.data.tasks.find(t=>t.id===id); }
function teamLeadOf(teamId){ return DB.data.users.find(u=>u.teamId===teamId && u.role==='teamlead'); }
function accountantsOf(teamId){ return DB.data.users.filter(u=>u.teamId===teamId && u.role==='accountant'); }
function fmtDate(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtDateTime(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) + ' · ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
function daysUntil(dateStr){
  const today = new Date('2026-06-20T00:00:00Z'); // app "now" anchor matches current date context
  const d = new Date(dateStr+'T00:00:00Z');
  return Math.round((d-today)/86400000);
}
const NOW = new Date('2026-06-20T00:00:00Z');

function slaBadge(task){
  if (task.stage === 'Done' || task.stage === 'Verified'){
    return `<span class="badge-sla-green">On track</span>`;
  }
  const d = daysUntil(task.dueDate);
  if (d < 0) return `<span class="badge-sla-red">${Math.abs(d)}d overdue</span>`;
  if (d <= 5) return `<span class="badge-sla-amber">Due in ${d}d</span>`;
  return `<span class="badge-sla-green">Due in ${d}d</span>`;
}
function slaState(task){
  if (task.stage === 'Done' || task.stage === 'Verified') return 'ok';
  const d = daysUntil(task.dueDate);
  if (d < 0) return 'red';
  if (d <= 5) return 'amber';
  return 'ok';
}

function stagePill(stageId){
  const m = stageMeta(stageId);
  return `<span class="stage-pill stage-${m.css}"><span class="dot"></span>${m.label}</span>`;
}

function stageRail(currentStageId){
  const idx = STAGE_INDEX[currentStageId];
  const color = stageMeta(currentStageId).color;
  let html = `<div class="stage-rail" style="--rail-color:${color}">`;
  STAGES.forEach((s,i)=>{
    const cls = i < idx ? 'seg fill' : (i === idx ? 'seg current' : 'seg');
    html += `<div class="${cls}"></div>`;
  });
  html += `</div>`;
  return html;
}

function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function toast(msg, type=''){
  const stack = document.getElementById('toast-stack');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity 0.2s'; setTimeout(()=>el.remove(), 200); }, 3200);
}

function openModal(html, opts={}){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-backdrop" id="modal-backdrop"><div class="modal ${opts.wide?'wide':''}">${html}</div></div>`;
  document.getElementById('modal-backdrop').addEventListener('mousedown', (e)=>{
    if (e.target.id === 'modal-backdrop') closeModal();
  });
}
function closeModal(){
  document.getElementById('modal-root').innerHTML = '';
}

const PAGE_TITLES = {
  overview: { manager:['Firm Overview','Snapshot across all 3 teams'], teamlead:['Team Overview', 'Your team at a glance'] },
  mytasks: ['My Tasks', 'Tasks assigned to you, across all stages'],
  board: ['Task Board', 'Drag cards across stages to update status'],
  clients: ['Clients', 'Master client records and current work status'],
  vat: ['VAT Filing Calendar', 'Who has VAT due, and when'],
  calendar: ['Calendar', 'Accounting and VAT due dates by month'],
  insights: ['AI Insights', 'Performance analytics across the firm'],
  admin: ['Admin Center', 'Teams, clients, users and task generation'],
  audit: ['Audit Log', 'Every stage change, firm-wide'],
  clientdetail: ['Client', ''],
  taskdetail: ['Task', ''],
};

function navigate(route, param=null){
  LL.route = route;
  LL.routeParam = param;
  highlightNav();
  renderRoute(route, param, false);
  injectExportButton();
}

function setPageTitle(route, override){
  let t = PAGE_TITLES[route];
  if (Array.isArray(t)) t = t;
  else if (t && t[LL.user.role]) t = t[LL.user.role];
  else t = ['',''];
  document.getElementById('page-title').textContent = override?.title || t[0];
  document.getElementById('page-sub').textContent = override?.sub || t[1] || '';
}

function renderRoute(route, param, isLiveRefresh){
  // Preserve scroll position on live refresh re-renders
  const contentEl = document.getElementById('content');
  const scrollTop = contentEl.scrollTop;

  switch(route){
    case 'overview': renderOverview(); break;
    case 'mytasks': renderMyTasks(); break;
    case 'board': renderBoard(); break;
    case 'clients': renderClients(); break;
    case 'clientdetail': renderClientDetail(param); break;
    case 'taskdetail': renderTaskDetail(param); break;
    case 'vat': renderVatView(); break;
    case 'calendar': renderCalendarView(); break;
    case 'insights': renderInsights(); break;
    case 'admin': renderAdmin(); break;
    case 'audit': renderAuditLog(); break;
    default: renderOverview();
  }
  if (isLiveRefresh) contentEl.scrollTop = scrollTop;
}

/* ---------- Scope helpers (server-side-equivalent enforcement) ----------
   Every list-producing function below filters by the ACTING user's role/team/id.
   These are the single choke points all views use, so permission logic lives in one place. */
function visibleTasks(user){
  if (user.role === 'manager') return DB.data.tasks.slice();
  if (user.role === 'teamlead') return DB.data.tasks.filter(t=>t.teamId === user.teamId);
  return DB.data.tasks.filter(t=>t.assigneeId === user.id);
}
function visibleClients(user){
  if (user.role === 'manager') return DB.data.clients.slice();
  if (user.role === 'teamlead') return DB.data.clients.filter(c=>c.teamId === user.teamId);
  // Accountants don't get a standalone client management view (no manageClients/viewClients perm),
  // but they still need client names for their task cards — handled via clientById() directly, not this list.
  return DB.data.clients.filter(c=>c.teamId === user.teamId);
}
function visibleTeams(user){
  if (user.role === 'manager') return DB.data.teams.slice();
  return DB.data.teams.filter(t=>t.id === user.teamId);
}

/* ---------- Overview (role-aware dashboard-first landing) ---------- */
function renderOverview(){
  setPageTitle('overview');
  const user = LL.user;
  const tasks = visibleTasks(user);
  const clients = visibleClients(user);

  const openCount = tasks.filter(t=>!['Done'].includes(t.stage)).length;
  const overdue = tasks.filter(t=> t.stage!=='Done' && t.stage!=='Verified' && daysUntil(t.dueDate) < 0).length;
  const inReview = tasks.filter(t=>t.stage==='InReview').length;
  const rework = tasks.filter(t=>t.stage==='Rework').length;

  let html = `<div class="stat-grid">
    ${statCard('Active Tasks', openCount, '')}
    ${statCard('Overdue', overdue, overdue>0?'down':'', overdue>0?'Needs attention':'All on schedule')}
    ${statCard('Awaiting Review', inReview, '')}
    ${statCard('In Rework', rework, rework>0?'down':'')}
  </div>`;

  if (user.role === 'manager'){
    html += renderTeamComparisonBlock();
    html += `<div class="section-head" style="margin-top:22px;"><h2>Tasks needing attention firm-wide</h2></div>`;
    html += renderAttentionTable(tasks.filter(t=>t.stage!=='Done'));
  } else if (user.role === 'teamlead'){
    html += renderTeamBlock(user.teamId);
    html += `<div class="section-head" style="margin-top:22px;"><h2>Tasks needing attention — ${teamById(user.teamId).name}</h2></div>`;
    html += renderAttentionTable(tasks.filter(t=>t.stage!=='Done'));
  }

  document.getElementById('content').innerHTML = html;
  wireAttentionTable();
}

function statCard(label, value, deltaClass, deltaText){
  return `<div class="stat-card">
    <div class="stat-label">${label}</div>
    <div class="stat-value">${value}</div>
    ${deltaText ? `<div class="stat-delta ${deltaClass}">${deltaText}</div>` : ''}
  </div>`;
}

function renderTeamComparisonBlock(){
  let html = `<div class="card card-pad" style="margin-bottom:6px;">
    <div class="section-head" style="margin-bottom:12px;"><h2>Teams at a glance</h2></div>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:14px;">`;
  DB.data.teams.forEach(team=>{
    const tTasks = DB.data.tasks.filter(t=>t.teamId===team.id);
    const active = tTasks.filter(t=>t.stage!=='Done').length;
    const overdue = tTasks.filter(t=>t.stage!=='Done' && t.stage!=='Verified' && daysUntil(t.dueDate)<0).length;
    const rework = tTasks.filter(t=>t.stage==='Rework').length;
    const lead = teamLeadOf(team.id);
    const accs = accountantsOf(team.id);
    html += `<div style="border:1px solid var(--border); border-radius:12px; padding:14px;">
      <div class="flex items-center gap-8" style="margin-bottom:10px;">
        <div class="user-avatar" style="background:var(--brand);">${initials(team.name)}</div>
        <div>
          <div class="fw-600" style="font-size:13.5px;">${team.name}</div>
          <div class="text-xs muted">${lead?lead.name:'—'} · ${accs.length} accountants</div>
        </div>
      </div>
      <div class="flex gap-8" style="flex-wrap:wrap;">
        <div class="kpi-chip" style="flex:1; min-width:0;"><div class="kv">${active}</div><div class="kl">Active</div></div>
        <div class="kpi-chip" style="flex:1; min-width:0;"><div class="kv" style="color:${overdue>0?'var(--danger)':'inherit'}">${overdue}</div><div class="kl">Overdue</div></div>
        <div class="kpi-chip" style="flex:1; min-width:0;"><div class="kv" style="color:${rework>0?'var(--stage-rework)':'inherit'}">${rework}</div><div class="kl">Rework</div></div>
      </div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderTeamBlock(teamId){
  const team = teamById(teamId);
  const lead = teamLeadOf(teamId);
  const accs = accountantsOf(teamId);
  let html = `<div class="card card-pad" style="margin-bottom:6px;">
    <div class="section-head" style="margin-bottom:12px;"><h2>${team.name} roster</h2></div>
    <div class="flex gap-12" style="flex-wrap:wrap;">`;
  [lead, ...accs].forEach(u=>{
    const myTasks = DB.data.tasks.filter(t=>t.assigneeId===u.id && t.stage!=='Done');
    html += `<div style="border:1px solid var(--border); border-radius:12px; padding:12px 14px; min-width:180px; flex:1;">
      <div class="flex items-center gap-8">
        <div class="user-avatar" style="background:${u.role==='teamlead'?'var(--accent)':'var(--brand)'};">${initials(u.name)}</div>
        <div>
          <div class="fw-600" style="font-size:13px;">${u.name}</div>
          <div class="text-xs muted">${roleLabel(u.role)}</div>
        </div>
      </div>
      <div class="text-xs muted" style="margin-top:8px;">${myTasks.length} active task${myTasks.length!==1?'s':''}</div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderAttentionTable(tasks){
  const sorted = tasks.slice().sort((a,b)=> daysUntil(a.dueDate) - daysUntil(b.dueDate)).slice(0,10);
  if (!sorted.length) return emptyState('All caught up', 'No active tasks need attention right now.');
  let html = `<div class="card scroll-x"><table class="tbl"><thead><tr>
    <th>Client</th><th>Type</th><th>Period</th><th>Stage</th><th>Assignee</th><th>Due</th><th>SLA</th>
  </tr></thead><tbody>`;
  sorted.forEach(t=>{
    const c = clientById(t.clientId);
    const a = userById(t.assigneeId);
    html += `<tr class="row-click" data-task="${t.id}">
      <td class="fw-600">${escapeHtml(c.name)}</td>
      <td><span class="tag ${t.taskType==='VAT Filing'?'tag-vat':'tag-acc'}">${t.taskType}</span></td>
      <td>${t.period}</td>
      <td>${stagePill(t.stage)}</td>
      <td>${escapeHtml(a.name)}</td>
      <td>${fmtDate(t.dueDate)}</td>
      <td>${slaBadge(t)}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}
function wireAttentionTable(){
  document.querySelectorAll('tr[data-task]').forEach(row=>{
    row.addEventListener('click', ()=> navigate('taskdetail', row.dataset.task));
  });
}
function emptyState(title, sub){
  return `<div class="empty-state card">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.6"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <h4>${title}</h4><p>${sub}</p>
  </div>`;
}

/* ---------- My Tasks (Accountant) ---------- */
function renderMyTasks(){
  setPageTitle('mytasks');
  const user = LL.user;
  let tasks = visibleTasks(user);

  const state = LL._myTasksFilter || { type:'all', view:'kanban' };
  LL._myTasksFilter = state;

  if (state.type !== 'all') tasks = tasks.filter(t=>t.taskType === state.type);

  let html = `<div class="section-head">
    <div class="filter-bar">
      <div class="pill-toggle" id="mt-type-toggle">
        <button data-v="all" class="${state.type==='all'?'active':''}">All</button>
        <button data-v="Accounting" class="${state.type==='Accounting'?'active':''}">Accounting</button>
        <button data-v="VAT Filing" class="${state.type==='VAT Filing'?'active':''}">VAT Filing</button>
      </div>
    </div>
    <div class="pill-toggle" id="mt-view-toggle">
      <button data-v="kanban" class="${state.view==='kanban'?'active':''}">Board</button>
      <button data-v="list" class="${state.view==='list'?'active':''}">List</button>
    </div>
  </div>`;

  if (!tasks.length){
    html += emptyState('No tasks yet', 'Tasks assigned to you will appear here.');
  } else if (state.view === 'kanban'){
    html += renderKanban(tasks, user);
  } else {
    html += renderTaskListTable(tasks, { showAssignee:false });
  }

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('#mt-type-toggle button').forEach(b=>{
    b.addEventListener('click', ()=>{ state.type = b.dataset.v; renderMyTasks(); });
  });
  document.querySelectorAll('#mt-view-toggle button').forEach(b=>{
    b.addEventListener('click', ()=>{ state.view = b.dataset.v; renderMyTasks(); });
  });
  wireKanbanDnD();
  wireTaskListClicks();
}

/* ---------- Task Board (Manager / Team Lead) ---------- */
function renderBoard(){
  setPageTitle('board');
  const user = LL.user;
  const state = LL._boardFilter || { team:'all', type:'all', assignee:'all' };
  LL._boardFilter = state;

  let tasks = visibleTasks(user);
  if (user.role === 'manager' && state.team !== 'all') tasks = tasks.filter(t=>t.teamId === state.team);
  if (state.type !== 'all') tasks = tasks.filter(t=>t.taskType === state.type);
  if (state.assignee !== 'all') tasks = tasks.filter(t=>t.assigneeId === state.assignee);

  const teamOptions = user.role==='manager' ? DB.data.teams : [];
  const assigneePool = user.role==='manager'
    ? DB.data.users.filter(u=>u.role==='accountant')
    : accountantsOf(user.teamId);

  let html = `<div class="section-head">
    <div class="filter-bar">
      ${user.role==='manager' ? `<select id="bf-team"><option value="all">All teams</option>${teamOptions.map(t=>`<option value="${t.id}" ${state.team===t.id?'selected':''}>${t.name}</option>`).join('')}</select>` : ''}
      <select id="bf-type">
        <option value="all" ${state.type==='all'?'selected':''}>All task types</option>
        <option value="Accounting" ${state.type==='Accounting'?'selected':''}>Accounting</option>
        <option value="VAT Filing" ${state.type==='VAT Filing'?'selected':''}>VAT Filing</option>
      </select>
      <select id="bf-assignee">
        <option value="all">All accountants</option>
        ${assigneePool.map(a=>`<option value="${a.id}" ${state.assignee===a.id?'selected':''}>${a.name}</option>`).join('')}
      </select>
      <button class="btn btn-secondary btn-sm" id="bf-reset">Reset</button>
    </div>
    ${can(user,'createTasks') ? `<button class="btn btn-primary btn-sm" id="new-task-btn">+ New task</button>` : ''}
  </div>`;

  html += renderKanban(tasks, user);
  document.getElementById('content').innerHTML = html;

  if (user.role==='manager') document.getElementById('bf-team').addEventListener('change', e=>{ state.team=e.target.value; renderBoard(); });
  document.getElementById('bf-type').addEventListener('change', e=>{ state.type=e.target.value; renderBoard(); });
  document.getElementById('bf-assignee').addEventListener('change', e=>{ state.assignee=e.target.value; renderBoard(); });
  document.getElementById('bf-reset').addEventListener('click', ()=>{ LL._boardFilter = {team:'all',type:'all',assignee:'all'}; renderBoard(); });
  const newBtn = document.getElementById('new-task-btn');
  if (newBtn) newBtn.addEventListener('click', openNewTaskModal);

  wireKanbanDnD();
}

function renderKanban(tasks, user){
  let html = `<div class="kanban">`;
  STAGES.forEach(stage=>{
    const col = tasks.filter(t=>t.stage===stage.id);
    html += `<div class="kcol">
      <div class="kcol-head" style="--rail-color:${stage.color}">
        <span class="dot"></span><span class="name">${stage.label}</span><span class="ct">${col.length}</span>
      </div>
      <div class="kcol-body" data-stage="${stage.id}">`;
    col.forEach(t=>{
      const c = clientById(t.clientId);
      const a = userById(t.assigneeId);
      const draggable = !!canDragTask(t, user);
      html += `<div class="kcard" draggable="${draggable}" data-task="${t.id}">
        <div class="kc-client">${escapeHtml(c.name)}</div>
        <div class="kc-period"><span class="tag ${t.taskType==='VAT Filing'?'tag-vat':'tag-acc'}" style="margin-right:5px;">${t.taskType==='VAT Filing'?'VAT':'Acct'}</span>${t.period}</div>
        <div class="kc-foot">
          <div class="kc-assignee"><div class="mini-avatar">${initials(a.name)}</div>${a.name.split(' ')[0]}</div>

function canDragTask(task, user){
  // A card is draggable if the user could plausibly initiate *some* valid transition from its stage.
  if (user.role === 'accountant') return task.assigneeId === user.id && TRANSITIONS[task.stage].length>0;
  if (user.role === 'teamlead') return task.teamId === user.teamId && TRANSITIONS[task.stage].length>0;
  return TRANSITIONS[task.stage].length>0; // manager
}

function wireKanbanDnD(){
  let draggedId = null;
  document.querySelectorAll('.kcard[draggable=true]').forEach(card=>{
    card.addEventListener('dragstart', (e)=>{
      draggedId = card.dataset.task;
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', ()=> card.classList.remove('dragging'));
  });
  // Clicking a card (without drag) opens detail
  document.querySelectorAll('.kcard').forEach(card=>{
    card.addEventListener('click', (e)=>{
      navigate('taskdetail', card.dataset.task);
    });
  });
  document.querySelectorAll('.kcol-body').forEach(col=>{
    col.addEventListener('dragover', (e)=>{
      e.preventDefault();
      col.classList.add('drop-target');
    });
    col.addEventListener('dragleave', ()=> col.classList.remove('drop-target'));
    col.addEventListener('drop', (e)=>{
      e.preventDefault();
      col.classList.remove('drop-target');
      if (!draggedId) return;
      const targetStage = col.dataset.stage;
      attemptStageChange(draggedId, targetStage);
      draggedId = null;
    });
  });
}

/** Single choke-point for all stage changes — kanban drag, task detail buttons, etc. all call this. */
function attemptStageChange(taskId, toStage){
  const task = taskById(taskId);
  if (!task) return;
  const result = canTransition(task, toStage, LL.user);
  if (!result.ok){
    toast(result.reason, 'error');
    return;
  }
  const from = task.stage;
  task.stage = toStage;
  task.updatedAt = new Date().toISOString();
  task.activity.push({ ts: task.updatedAt, by: LL.user.name, text: `Moved from ${stageMeta(from).label} to ${stageMeta(toStage).label}.` });
  pushNotificationsForStageChange(task, from, toStage);
  DB.save();
  toast(`Moved to "${stageMeta(toStage).label}".`, 'success');
  renderCurrentRoute();
}

function pushNotificationsForStageChange(task, fromStage, toStage){
  const c = clientById(task.clientId);
  const text = `${c.name} (${task.taskType}, ${task.period}) moved from ${stageMeta(fromStage).label} to ${stageMeta(toStage).label}.`;
  const targets = new Set();
  // Notify the assignee (if not the actor), the team lead, and the manager — scoped per Section 10.
  targets.add(task.assigneeId);
  const lead = teamLeadOf(task.teamId);
  if (lead) targets.add(lead.id);
  DB.data.users.filter(u=>u.role==='manager').forEach(m=>targets.add(m.id));
  targets.delete(LL.user.id); // don't notify the actor about their own action
  targets.forEach(uid=>{
    DB.data.notifications.unshift({
      id: 'n-' + Date.now() + '-' + uid,
      userId: uid,
      text,
      read: false,
      ts: new Date().toISOString(),
      taskId: task.id,
    });
  });
}

function renderStageActionButtons(task, user){
  const next = TRANSITIONS[task.stage] || [];
  if (!next.length) return `<span class="text-sm muted" style="padding:6px 0;">Task closed</span>`;
  let html = '';
  next.forEach(to=>{
    const check = canTransition(task, to, user);
    const label = stageActionLabel(task.stage, to);
    html += `<button class="btn ${to==='Rework'?'btn-danger':'btn-secondary'} btn-sm stage-action-btn" data-to="${to}" ${check.ok?'':'disabled title="'+escapeHtml(check.reason)+'"'}>${label}</button>`;
  });
  return html;
}
function stageActionLabel(from, to){
  const map = {
    'Open->ToDo':'Move to To Do',
    'ToDo->InProgress':'Start Task',
    'InProgress->DocsAwaiting':'Mark Docs Awaiting',
    'DocsAwaiting->InProgress':'Documents Received',
    'InProgress->InReview':'Submit for Review',
    'InReview->Rework':'Send to Rework',
    'InReview->Verified':'Approve (Verify)',
    'Rework->InReview':'Resubmit for Review',
    'Verified->Done':'Mark Done (Shared with Client)',
  };
  return map[transitionKey(from,to)] || `Move to ${stageMeta(to).label}`;
}
function wireStageActionButtons(task){
  document.querySelectorAll('.stage-action-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const to = btn.dataset.to;
      if (to === 'InReview'){
        const missing = missingRequiredFields(task);
        if (missing.length){
          showInlineFieldErrors(missing);
          return;
        }
      }
      if (to === 'Rework'){
        openReworkCommentModal(task);
        return;
      }
      attemptStageChange(task.id, to);
    });
  });

/* ---------- New Task modal (Manager / Team Lead) ---------- */
function openNewTaskModal(){
  const user = LL.user;
  const clientPool = user.role==='manager' ? DB.data.clients.filter(c=>c.status==='Active') : DB.data.clients.filter(c=>c.status==='Active' && c.teamId===user.teamId);
  openModal(`
    <div class="modal-header"><h3>New Task</h3><button class="icon-btn" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="field">
        <label>Client</label>
        <select id="nt-client">${clientPool.map(c=>`<option value="${c.id}">${escapeHtml(c.name)} — ${teamById(c.teamId).name}</option>`).join('')}</select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Task Type</label>

          <input type="text" id="nt-period" placeholder="e.g. July 2026 or Q3 2026" />
        </div>

        <div class="field">
          <label>Assigned Accountant</label>
          <select id="nt-assignee"></select>
        </div>
        <div class="field">
          <label>Due Date</label>
          <input type="date" id="nt-due" />
        </div>
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="nt-desc" rows="2" placeholder="Auto-suggested if left blank"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="create-task-btn">Create Task</button>
    </div>
  `, { wide:false });

  const clientSel = document.getElementById('nt-client');
  function refreshAssignees(){
    const c = clientById(clientSel.value);
    const accs = accountantsOf(c.teamId);
    document.getElementById('nt-assignee').innerHTML = accs.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  }
  clientSel.addEventListener('change', refreshAssignees);
  refreshAssignees();

  document.getElementById('create-task-btn').addEventListener('click', ()=>{
    const clientId = clientSel.value;
    const c = clientById(clientId);
    const taskType = document.getElementById('nt-type').value;
    const period = document.getElementById('nt-period').value.trim();
    const assigneeId = document.getElementById('nt-assignee').value;
    const due = document.getElementById('nt-due').value;
    if (!period || !due){ toast('Period and due date are required.', 'error'); return; }
    if (taskType === 'VAT Filing' && !c.vatRegistered){ toast('This client is not VAT registered.', 'error'); return; }

    const id = 'task-' + (DB.data.nextTaskSeq++);
    const desc = document.getElementById('nt-desc').value.trim() || `${taskType==='VAT Filing'?'VAT filing':'Accounting'} for ${c.name} – ${period}`;
    const now = new Date().toISOString();
    DB.data.tasks.push({
      id, clientId, taskType, period, assigneeId, teamId: c.teamId, stage:'Open',
      dueDate: due, createdAt: now, updatedAt: now,
      accountingMethod: taskType==='Accounting' ? c.accountingMethod : null,
      transactionCount: null, description: desc, aiSummary: null,
      incomeExpenses: { income:null, expenses:null, notes:'' },
      activity: [{ ts: now, by: LL.user.name, text: 'Task created manually and placed in Open.' }],
    });
    DB.save();
    closeModal();
    toast('Task created.', 'success');
    renderCurrentRoute();
  });
}

/* ---------- Clients list ---------- */
function renderClients(){
  setPageTitle('clients');

  if (user.role==='manager' && state.team !== 'all') clients = clients.filter(c=>c.teamId===state.team);

  if (state.status !== 'all') clients = clients.filter(c=>c.status===state.status);

    <div class="filter-bar">
      ${user.role==='manager' ? `<select id="cf-team"><option value="all">All teams</option>${DB.data.teams.map(t=>`<option value="${t.id}" ${state.team===t.id?'selected':''}>${t.name}</option>`).join('')}</select>` : ''}

  </div>`;

  if (!clients.length){
    html += emptyState('No clients match', 'Try adjusting your filters.');

      <th>Client</th><th>Team</th><th>Periodicity</th><th>VAT</th><th>Current Status</th><th></th>

        <td>
          <div class="fw-600">${escapeHtml(c.name)}</div>
          <div class="text-xs muted">${c.trade}${c.trn?(' · TRN '+c.trn):''}</div>

        <td>
          <div class="client-status-dot-row">
            ${acct ? `<span title="Accounting: ${stageMeta(acct.stage).label}">${stagePill(acct.stage)}</span>` : ''}
            ${vat ? `<span title="VAT: ${stageMeta(vat.stage).label}">${stagePill(vat.stage)}</span>` : ''}

/* ============================================================
   VAT FILING CALENDAR (Section 7)
   ============================================================ */
function renderVatView(){
  setPageTitle('vat');
  const user = LL.user;

  if (user.role === 'accountant'){
    const tasks = visibleTasks(user).filter(t=>t.taskType==='VAT Filing');
    let html = emptyState ? '' : '';
    if (!tasks.length){
      document.getElementById('content').innerHTML = emptyState('No VAT tasks', 'You have no VAT filing tasks assigned.');
      return;
    }
    document.getElementById('content').innerHTML = renderTaskListTable(tasks, { showAssignee:false });
    wireTaskListClicks();
    return;
  }

  // Manager / Team Lead view
  const state = LL._vatFilter || { team:'all', month:'this', status:'all', q:'' };
  LL._vatFilter = state;

  let vatTasks = DB.data.tasks.filter(t=>t.taskType==='VAT Filing');
  if (user.role === 'teamlead'){ vatTasks = vatTasks.filter(t=>t.teamId===user.teamId); }
  else if (state.team !== 'all'){ vatTasks = vatTasks.filter(t=>t.teamId===state.team); }

  if (state.month === 'this'){
    vatTasks = vatTasks.filter(t=> sameMonth(t.dueDate, NOW));
  } else if (state.month === 'next'){
    const next = new Date(NOW); next.setMonth(next.getMonth()+1);
    vatTasks = vatTasks.filter(t=> sameMonth(t.dueDate, next));
  }
  if (state.status !== 'all') vatTasks = vatTasks.filter(t=>t.stage===state.status);
  if (state.q) vatTasks = vatTasks.filter(t=> clientById(t.clientId).name.toLowerCase().includes(state.q.toLowerCase()));

  const teamOptions = user.role==='manager' ? DB.data.teams : [];

  let html = `<div class="section-head">
    <div class="filter-bar">
      <div class="pill-toggle" id="vat-month-toggle">
        <button data-v="this" class="${state.month==='this'?'active':''}">Due This Month</button>
        <button data-v="next" class="${state.month==='next'?'active':''}">Due Next Month</button>
        <button data-v="all" class="${state.month==='all'?'active':''}">All</button>
      </div>
      ${user.role==='manager' ? `<select id="vat-team-sel"><option value="all">All teams</option>${teamOptions.map(t=>`<option value="${t.id}" ${state.team===t.id?'selected':''}>${t.name}</option>`).join('')}</select>` : ''}
      <select id="vat-status-sel">
        <option value="all">All stages</option>
        ${STAGES.map(s=>`<option value="${s.id}" ${state.status===s.id?'selected':''}>${s.label}</option>`).join('')}
      </select>
      <input type="text" id="vat-q" placeholder="Search client…" value="${escapeHtml(state.q)}" />
    </div>
  </div>`;

  if (!vatTasks.length){
    html += emptyState('No VAT filings match', 'Try a different month or filter.');
  } else {
    html += `<div class="card scroll-x"><table class="tbl"><thead><tr>
      <th>Client</th>${user.role==='manager'?'<th>Team</th>':''}<th>VAT Frequency</th><th>Filing Period</th><th>Due Date</th><th>Stage</th><th>Accountant</th><th>SLA</th>
    </tr></thead><tbody>`;
    vatTasks.sort((a,b)=>daysUntil(a.dueDate)-daysUntil(b.dueDate)).forEach(t=>{
      const c = clientById(t.clientId);
      const a = userById(t.assigneeId);
      html += `<tr class="row-click" data-task="${t.id}">
        <td class="fw-600">${escapeHtml(c.name)}</td>
        ${user.role==='manager'?`<td>${teamById(t.teamId).name}</td>`:''}
        <td>${c.vatFreq}</td>
        <td>${t.period}</td>
        <td>${fmtDate(t.dueDate)}</td>
        <td>${stagePill(t.stage)}</td>
        <td>${escapeHtml(a.name)}</td>
        <td>${slaBadge(t)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('#vat-month-toggle button').forEach(b=> b.addEventListener('click', ()=>{ state.month=b.dataset.v; renderVatView(); }));
  const teamSel = document.getElementById('vat-team-sel');
  if (teamSel) teamSel.addEventListener('change', e=>{ state.team=e.target.value; renderVatView(); });
  document.getElementById('vat-status-sel').addEventListener('change', e=>{ state.status=e.target.value; renderVatView(); });
  document.getElementById('vat-q').addEventListener('input', e=>{ state.q=e.target.value; renderVatView(); });
  wireTaskListClicks();
}

function sameMonth(dateStr, refDate){
  const d = new Date(dateStr+'T00:00:00Z');
  return d.getUTCFullYear()===refDate.getUTCFullYear() && d.getUTCMonth()===refDate.getUTCMonth();
}

/* ============================================================
   CALENDAR VIEW (month grid, Section 12 #8)
   ============================================================ */
function renderCalendarView(){
  setPageTitle('calendar');
  const user = LL.user;
  const state = LL._calState || { y: NOW.getUTCFullYear(), m: NOW.getUTCMonth() };
  LL._calState = state;

  let tasks = visibleTasks(user);
  const first = new Date(Date.UTC(state.y, state.m, 1));
  const startWeekday = first.getUTCDay(); // 0=Sun
  const daysInMonth = new Date(Date.UTC(state.y, state.m+1, 0)).getUTCDate();
  const monthLabel = first.toLocaleDateString('en-GB', { month:'long', year:'numeric' });

  const byDay = {};
  tasks.forEach(t=>{
    const d = new Date(t.dueDate+'T00:00:00Z');
    if (d.getUTCFullYear()===state.y && d.getUTCMonth()===state.m){
      const day = d.getUTCDate();
      (byDay[day] = byDay[day]||[]).push(t);
    }
  });

  let html = `<div class="section-head">
    <div class="flex items-center gap-10">
      <button class="icon-btn" id="cal-prev"><svg class="ic" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <h2 style="min-width:160px;">${monthLabel}</h2>
      <button class="icon-btn" id="cal-next"><svg class="ic" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div class="flex gap-10" style="font-size:11.5px; color:var(--ink-faint);">

/* ============================================================
   AI INSIGHTS (Manager-only) — Section 9
   Stats are computed deterministically; only the narrative text
   layer is framed as "AI-generated" on top of those computed numbers.
   ============================================================ */

function renderInsights(){
  if (!can(LL.user,'aiInsights')){ toast('AI Insights is available to Managers only.', 'error'); navigate('overview'); return; }
  setPageTitle('insights');

  const tasks = DB.data.tasks;
  const teams = DB.data.teams;

  // ---- Deterministic per-team stats ----
  const teamStats = teams.map(team=>{
    const tTasks = tasks.filter(t=>t.teamId===team.id);
    const closed = tTasks.filter(t=>t.stage==='Done');
    const onTime = closed.filter(t=> new Date(t.updatedAt) <= new Date(t.dueDate+'T23:59:59Z'));
    const reworkCount = tTasks.filter(t=>t.activity.some(a=>a.text.includes('Rework'))).length;
    const avgTurnaroundDays = closed.length ? Math.round(closed.reduce((s,t)=>{
      return s + (new Date(t.updatedAt)-new Date(t.createdAt))/86400000;
    },0)/closed.length) : 0;
    return {
      team, total: tTasks.length, closed: closed.length,
      onTimeRate: closed.length ? Math.round(onTime.length/closed.length*100) : 100,
      reworkRate: tTasks.length ? Math.round(reworkCount/tTasks.length*100) : 0,
      avgTurnaroundDays,
      activeLoad: tTasks.filter(t=>t.stage!=='Done').length,
    };
  });

  const firmReworkRate = Math.round(teamStats.reduce((s,t)=>s+t.reworkRate,0)/teamStats.length);

  // ---- Deterministic per-accountant stats ----
  const accountants = DB.data.users.filter(u=>u.role==='accountant');
  const accStats = accountants.map(acc=>{
    const aTasks = tasks.filter(t=>t.assigneeId===acc.id);
    const reworkCount = aTasks.filter(t=>t.activity.some(a=>a.text.includes('Rework'))).length;
    const reworkRate = aTasks.length ? Math.round(reworkCount/aTasks.length*100) : 0;
    const completed = aTasks.filter(t=>t.stage==='Done').length;
    const upcoming = aTasks.filter(t=> t.stage!=='Done' && daysUntil(t.dueDate)>=0 && daysUntil(t.dueDate)<=14).length;
    return { acc, team: teamById(acc.teamId), reworkRate, completed, activeLoad: aTasks.filter(t=>t.stage!=='Done').length, upcoming };
  });

  // ---- Bottleneck detection: average days currently sitting in Docs Awaiting, by team ----
  const docsAwaitingByTeam = teams.map(team=>{
    const items = tasks.filter(t=>t.teamId===team.id && t.stage==='DocsAwaiting');
    if (!items.length) return { team, avgDays: 0, count: 0 };
    const avgDays = Math.round(items.reduce((s,t)=> s + (NOW - new Date(t.updatedAt))/86400000, 0)/items.length);
    return { team, avgDays, count: items.length };
  }).filter(x=>x.count>0).sort((a,b)=>b.avgDays-a.avgDays);

  // ---- Narrative callouts (natural-language layer over the computed numbers above) ----
  const callouts = [];
  const worstRework = accStats.slice().sort((a,b)=>b.reworkRate-a.reworkRate)[0];
  if (worstRework && worstRework.reworkRate > firmReworkRate && worstRework.reworkRate > 0){
    callouts.push(`<b>${worstRework.acc.name}</b> has a ${worstRework.reworkRate}% rework rate this period, above the firm average of ${firmReworkRate}% — consider a short review session on common error patterns.`);
  }
  if (docsAwaitingByTeam.length){
    const top = docsAwaitingByTeam[0];
    callouts.push(`<b>${top.team.name}</b> is averaging ${top.avgDays} day${top.avgDays!==1?'s':''} in Docs Awaiting across ${top.count} task${top.count!==1?'s':''} — worth checking in on client document delays.`);
  }
  const busiest = teamStats.slice().sort((a,b)=>b.activeLoad-a.activeLoad)[0];
  const lightest = teamStats.slice().sort((a,b)=>a.activeLoad-b.activeLoad)[0];
  if (busiest && lightest && busiest.team.id !== lightest.team.id && (busiest.activeLoad - lightest.activeLoad) >= 2){
    callouts.push(`Workload is uneven this period: <b>${busiest.team.name}</b> is carrying ${busiest.activeLoad} active tasks versus <b>${lightest.team.name}</b>'s ${lightest.activeLoad} — consider rebalancing upcoming assignments.`);
  }
  const bestOnTime = teamStats.slice().sort((a,b)=>b.onTimeRate-a.onTimeRate)[0];
  if (bestOnTime && bestOnTime.closed>0){
    callouts.push(`<b>${bestOnTime.team.name}</b> leads the firm with a ${bestOnTime.onTimeRate}% on-time completion rate across ${bestOnTime.closed} closed task${bestOnTime.closed!==1?'s':''} this period.`);
  }

  let html = `<div class="stat-grid">
    ${statCard('Firm Avg Rework Rate', firmReworkRate+'%', '')}
    ${statCard('Tasks Closed (Done)', tasks.filter(t=>t.stage==='Done').length, '')}
    ${statCard('Active Across Firm', tasks.filter(t=>t.stage!=='Done').length, '')}
    ${statCard('Overdue Firm-wide', tasks.filter(t=>t.stage!=='Done'&&t.stage!=='Verified'&&daysUntil(t.dueDate)<0).length, '')}
  </div>`;

  if (callouts.length){
    html += `<div class="section-head"><h2>AI-generated insights</h2></div>`;
    callouts.forEach(c=>{
      html += `<div class="insight-callout">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M12 2a7 7 0 0 0-4 12.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26A7 7 0 0 0 12 2z"/><line x1="9" y1="21" x2="15" y2="21"/></svg>
        <p>${c}</p>
      </div>`;
    });
  }

  html += `<div class="section-head" style="margin-top:8px;"><h2>Per-team performance</h2></div>
  <div class="chart-wrap" style="margin-bottom:20px;">
    ${renderBarChartSVG(teamStats.map(t=>({label:t.team.name, value:t.onTimeRate})), 'On-time completion rate (%)')}
  </div>
  <div class="card scroll-x" style="margin-bottom:24px;">
    <table class="tbl"><thead><tr><th>Team</th><th>Total Tasks</th><th>Active Load</th><th>Closed</th><th>On-Time Rate</th><th>Rework Rate</th><th>Avg Turnaround</th></tr></thead><tbody>
    ${teamStats.map(t=>`<tr>
      <td class="fw-600">${t.team.name}</td>
      <td>${t.total}</td>
      <td>${t.activeLoad}</td>
      <td>${t.closed}</td>
      <td>${t.onTimeRate}%</td>
      <td style="color:${t.reworkRate>firmReworkRate?'var(--stage-rework)':'inherit'}">${t.reworkRate}%</td>
      <td>${t.avgTurnaroundDays} days</td>
    </tr>`).join('')}
    </tbody></table>
  </div>

  <div class="section-head"><h2>Per-accountant performance</h2></div>
  <div class="card scroll-x">
    <table class="tbl"><thead><tr><th>Accountant</th><th>Team</th><th>Active Load</th><th>Completed</th><th>Rework Rate</th><th>Due in 14 Days</th></tr></thead><tbody>
    ${accStats.map(a=>`<tr>
      <td class="fw-600">${a.acc.name}</td>
      <td>${a.team.name}</td>
      <td>${a.activeLoad}</td>
      <td>${a.completed}</td>
      <td style="color:${a.reworkRate>firmReworkRate?'var(--stage-rework)':'inherit'}">${a.reworkRate}%</td>
      <td>${a.upcoming}</td>
    </tr>`).join('')}
    </tbody></table>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function renderBarChartSVG(data, title){
  const w = 760, h = 200, pad = 36;
  const max = Math.max(100, ...data.map(d=>d.value));
  const barW = (w - pad*2) / data.length - 16;
  let bars = '';
  data.forEach((d,i)=>{
    const x = pad + i*((w-pad*2)/data.length) + 8;
    const barH = (d.value/max) * (h - 50);
    const y = h - 30 - barH;
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="4" fill="#2A4A75"></rect>
      <text x="${x+barW/2}" y="${y-7}" text-anchor="middle" font-size="11" fill="#10172A" font-weight="600">${d.value}%</text>
      <text x="${x+barW/2}" y="${h-12}" text-anchor="middle" font-size="10.5" fill="#8A91A3">${escapeHtml(d.label)}</text>`;
  });
  return `<div class="chart-title">${title}</div>
  <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; max-height:220px;">
    <line x1="${pad}" y1="${h-30}" x2="${w-pad}" y2="${h-30}" stroke="#E3E3DD" stroke-width="1"/>
    ${bars}
  </svg>`;
}

/* ---------- Auto-generation preview/commit (Section 3.3, 12 #6) ----------
   Simplified deterministic preview: for each active client, generate the next
   period's task(s) if a task for that exact period doesn't already exist. */
function computeUpcomingTaskPreview(){
  const preview = [];
  const next = new Date(NOW); next.setMonth(next.getMonth()+1);
  const nextMonthLabel = next.toLocaleDateString('en-GB',{month:'long', year:'numeric'});
  const nextMonthNum = next.getUTCMonth()+1;

  DB.data.clients.filter(c=>c.status==='Active').forEach(c=>{
    // Accounting stream
    let acctPeriod = null, acctDue = null;
    if (c.periodicity === 'Monthly'){ acctPeriod = nextMonthLabel; acctDue = endOfMonthISO(next); }
    else if (c.periodicity === 'Quarterly'){ /* only generate at quarter boundaries — skip mid-quarter preview noise */ }
    else if (c.periodicity === 'Annual'){ /* generated once per year at fiscal year start — skip mid-year */ }

    if (acctPeriod){
      const exists = DB.data.tasks.some(t=>t.clientId===c.id && t.taskType==='Accounting' && t.period===acctPeriod);
      if (!exists) preview.push({ clientId:c.id, clientName:c.name, taskType:'Accounting', period:acctPeriod, dueDate:acctDue });
    }

    // VAT stream — independent of accounting periodicity (Section 3.2 key implication)
    if (c.vatRegistered){
      if (c.vatFreq === 'Monthly'){
        const exists = DB.data.tasks.some(t=>t.clientId===c.id && t.taskType==='VAT Filing' && t.period===nextMonthLabel);
        if (!exists) preview.push({ clientId:c.id, clientName:c.name, taskType:'VAT Filing', period:nextMonthLabel, dueDate:endOfMonthISO(next, 28) });
      } else if (c.vatFreq === 'Quarterly'){
        const cycleMonths = DB.data.vatCycles[c.vatCycle].months;
        if (cycleMonths.includes(nextMonthNum)){
          const qLabel = 'Filing month: ' + nextMonthLabel;
          const exists = DB.data.tasks.some(t=>t.clientId===c.id && t.taskType==='VAT Filing' && t.period.includes(nextMonthLabel));
          if (!exists) preview.push({ clientId:c.id, clientName:c.name, taskType:'VAT Filing', period:qLabel, dueDate:endOfMonthISO(next,28) });
        }
      }
    }
  });
  return preview;
}
function endOfMonthISO(dateObj, dayOverride){
  const y = dateObj.getUTCFullYear(), m = dateObj.getUTCMonth();
  const d = dayOverride || new Date(Date.UTC(y,m+1,0)).getUTCDate();
  return `${y}-${String(m+1).padStart(2,'0')}-${String(Math.min(d, new Date(Date.UTC(y,m+1,0)).getUTCDate())).padStart(2,'0')}`;
}
function commitTaskGeneration(preview){
  const now = new Date().toISOString();
  preview.forEach(p=>{
    const c = clientById(p.clientId);
    const id = 'task-' + (DB.data.nextTaskSeq++);
    DB.data.tasks.push({
      id, clientId:p.clientId, taskType:p.taskType, period:p.period,
      assigneeId: accountantsOf(c.teamId)[0]?.id || accountantsOf(c.teamId)[0],
      teamId: c.teamId, stage:'Open', dueDate:p.dueDate, createdAt:now, updatedAt:now,
      accountingMethod: p.taskType==='Accounting' ? c.accountingMethod : null,
      transactionCount:null, description:`${p.taskType==='VAT Filing'?'VAT filing':'Accounting'} for ${c.name} – ${p.period}`,
      aiSummary:null, incomeExpenses:{income:null,expenses:null,notes:''},
      activity:[{ts:now, by:'System', text:'Task auto-generated and placed in Open.'}],
    });
  });
  DB.save();
}

  const currentLead = teamLeadOf(teamId);
  const currentAccs = accountantsOf(teamId);

  openModal(`
    <div class="modal-header"><h3>Manage ${escapeHtml(team.name)}</h3><button class="icon-btn" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="field">
        <label>Team Lead</label>
        <select id="assign-lead">
          <option value="">— Unassigned —</option>
          ${DB.data.users.filter(u=>u.role==='teamlead').map(u=>`<option value="${u.id}" ${currentLead&&currentLead.id===u.id?'selected':''}>${u.name}${u.teamId&&u.teamId!==teamId?' (currently: '+teamById(u.teamId).name+')':''}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Accountants (select up to 2)</label>
        <select id="assign-acc1">
          <option value="">— None —</option>
          ${DB.data.users.filter(u=>u.role==='accountant').map(u=>`<option value="${u.id}" ${currentAccs[0]&&currentAccs[0].id===u.id?'selected':''}>${u.name}${u.teamId&&u.teamId!==teamId?' (currently: '+teamById(u.teamId).name+')':''}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <select id="assign-acc2">
          <option value="">— None —</option>
          ${DB.data.users.filter(u=>u.role==='accountant').map(u=>`<option value="${u.id}" ${currentAccs[1]&&currentAccs[1].id===u.id?'selected':''}>${u.name}${u.teamId&&u.teamId!==teamId?' (currently: '+teamById(u.teamId).name+')':''}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="save-team-members-btn">Save</button></div>
  `, { wide:true });

  document.getElementById('save-team-members-btn').addEventListener('click', ()=>{
    const leadId = document.getElementById('assign-lead').value;
    const acc1 = document.getElementById('assign-acc1').value;
    const acc2 = document.getElementById('assign-acc2').value;
    if (acc1 && acc2 && acc1===acc2){ toast('Please select two different accountants.', 'error'); return; }
    // Clear previous holders of this team's lead/accountant slots, then assign anew.
    DB.data.users.forEach(u=>{
      if (u.role==='teamlead' && u.teamId===teamId) u.teamId = null;
      if (u.role==='accountant' && u.teamId===teamId) u.teamId = null;
    });
    if (leadId) userById(leadId).teamId = teamId;
    if (acc1) userById(acc1).teamId = teamId;
    if (acc2) userById(acc2).teamId = teamId;
    DB.save(); closeModal(); toast('Team membership updated.', 'success'); renderCurrentRoute();
  });
}

function openUserFormModal(user){
  const isEdit = !!user;
